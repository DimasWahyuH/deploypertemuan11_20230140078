<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Silahkan register dahulu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; /* Pake min-height biar kalau formnya panjang, backgroundnya ngikut */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px; /* Tambah padding biar di HP nggak nempel pinggir */
        }

        .register-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px; /* Sedikit lebih lebar dari form login */
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .register-header h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 2rem;
        }

        .register-header p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* Styling Input Field */
        .input-group {
            margin-bottom: 15px; /* Margin dikecilin dikit biar form panjang nggak makan tempat */
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1e3c72;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background-color: #f8fafc;
        }

        .input-group input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
            outline: none;
            background-color: #fff;
        }

        /* Styling Tombol Register */
        .btn-register {
            width: 100%;
            padding: 15px;
            background: #10b981; /* Pake warna hijau biar beda feeling sama tombol login */
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-register:hover {
            background: #059669; /* Hijau lebih gelap pas di-hover */
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        /* Link ke halaman login */
        .register-footer {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .link-login {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .link-login:hover {
            color: #2a5298;
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="register-card">
    <div class="register-header">
        <h1>Create Account</h1>
        <p>Fill in the details below to get started</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}">

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Choose a username" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Create a strong password" required>
        </div>

        <div class="input-group">
            <label for="nama">Full Name</label>
            <input type="text" id="nama" th:field="*{nama}" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label for="alamat">Address</label>
            <input type="text" id="alamat" th:field="*{alamat}" placeholder="Enter your current address" required>
        </div>

        <button type="submit" class="btn-register">Register Now</button>
    </form>

    <div class="register-footer">
        <p>Sudah punya akun? <a th:href="@{/login}" class="link-login">Login Di Sini</a></p>
    </div>
</div>

</body>
</html>
